name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── PyPI: cue python package + CLI ─────────────────────────
  pypi:
    name: Publish cue to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install build hatchling
      - run: python -m build --outdir dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
          verbose: true
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/

  # ─── Electron desktop builds for all platforms ───────────────
  electron:
    name: Build Cue desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Convert SVG icon → platform formats. macOS has sips/iconutil; Linux uses
      # rsvg-convert; Windows uses ImageMagick that comes with chocolatey.
      - name: Generate icon (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p build/icon.iconset
          for SIZE in 16 32 64 128 256 512 1024; do
            sips -s format png -z $SIZE $SIZE build/icon.svg --out build/icon.iconset/icon_${SIZE}x${SIZE}.png || true
          done
          # Also write the @2x sizes
          cp build/icon.iconset/icon_32x32.png   build/icon.iconset/icon_16x16@2x.png   2>/dev/null || true
          cp build/icon.iconset/icon_64x64.png   build/icon.iconset/icon_32x32@2x.png   2>/dev/null || true
          cp build/icon.iconset/icon_256x256.png build/icon.iconset/icon_128x128@2x.png 2>/dev/null || true
          cp build/icon.iconset/icon_512x512.png build/icon.iconset/icon_256x256@2x.png 2>/dev/null || true
          cp build/icon.iconset/icon_1024x1024.png build/icon.iconset/icon_512x512@2x.png 2>/dev/null || true
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Generate icon (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 1024 -h 1024 build/icon.svg -o build/icon.png

      - name: Generate icon (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install -y imagemagick
          magick build/icon.svg -resize 256x256 build/icon.ico

      - name: Build artifacts
        run: npm run build -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
            electron/dist/*.exe
            electron/dist/*.AppImage
            electron/dist/*.deb

  # ─── Aggregate everything onto the GitHub Release ────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [pypi, electron]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BODY=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md || true)
          [ -z "$BODY" ] && BODY="Cue ${GITHUB_REF_NAME}\n\nDownloads:\n- macOS: \`Cue-*.dmg\`\n- Windows: \`Cue Setup *.exe\`\n- Linux: \`Cue-*.AppImage\`"
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.BODY }}
          files: |
            artifacts/desktop-macos-latest/*
            artifacts/desktop-windows-latest/*
            artifacts/desktop-ubuntu-latest/*
            artifacts/pypi-dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
